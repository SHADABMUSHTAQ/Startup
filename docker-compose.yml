services:
  # ─────────────────────────────────────────
  # 1. MongoDB (Authenticated)
  # ─────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: warsoc_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"  # Expose for local testing only
    # No ports exposed for MongoDB in production
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: WarSOC_DB
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-warsoc_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-W4rS0c_M0ng0_S3cur3_2026!}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # 2. Redis (Password Protected)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: warsoc_redis
    restart: unless-stopped
    # No ports exposed for Redis in production
    command: redis-server --requirepass ${REDIS_PASSWORD:-W4rS0c_R3d1s_S3cur3_2026!}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-W4rS0c_R3d1s_S3cur3_2026!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # 3. FastAPI Backend
  # ─────────────────────────────────────────
  api:
    build: .
    container_name: warsoc_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────
  # 4. Background Worker
  # ─────────────────────────────────────────
  worker:
    build: .
    container_name: warsoc_worker
    restart: unless-stopped
    command: ["python", "worker.py"]
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mongo_data:
